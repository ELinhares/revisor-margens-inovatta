steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/inovatta-revisor-margens/revisor-margens-api:$COMMIT_SHA'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/inovatta-revisor-margens/revisor-margens-api:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'revisor-margens-api'
      - '--image=gcr.io/inovatta-revisor-margens/revisor-margens-api:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--max-instances=5'
      - '--project=inovatta-revisor-margens'

images:
  - 'gcr.io/inovatta-revisor-margens/revisor-margens-api:$COMMIT_SHA'
